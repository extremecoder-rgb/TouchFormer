<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="static/style.css">

<body class="robotics-theme">
    <nav class="navbar">
        <div class="logo">TouchGPT Foundation</div>

            <li><a href="robot.html" class="active">Robotics Simulator</a></li>
